version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: wallet-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    ports:
      - "3308:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    container_name: wallet-api

    build:
      context: .
      dockerfile: Dockerfile

    restart: always

    working_dir: /app

    depends_on:
      mysql:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "4000:3000"


volumes:
  mysql_data: